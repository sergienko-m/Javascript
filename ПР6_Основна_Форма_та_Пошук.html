<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ПР6 Варіант 1 — Форма + Пошук</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0f;
      --surface: #16161a;
      --surface2: #1e1e24;
      --border: #2a2a35;
      --accent: #7c6dfa;
      --accent2: #fa6d8c;
      --success: #4ade80;
      --error: #f87171;
      --warning: #fbbf24;
      --text: #f0f0f5;
      --muted: #6b6b80;
      --font-display: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ─── Layout ─── */
    .page-header {
      border-bottom: 1px solid var(--border);
      padding: 24px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .page-header h1 {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }
    .badge {
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 40px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
    }

    @media (max-width: 800px) {
      .container { grid-template-columns: 1fr; padding: 24px 20px; }
      .page-header { padding: 20px; }
    }

    /* ─── Section Titles ─── */
    .section-title {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::before {
      content: '';
      width: 4px;
      height: 22px;
      border-radius: 2px;
      background: var(--accent);
    }

    /* ─── Card ─── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
    }

    /* ─── Progress Bar ─── */
    .progress-wrap {
      margin-bottom: 28px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .progress-track {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 0.4s cubic-bezier(.4,0,.2,1);
      width: 0%;
    }

    /* ─── Form Fields ─── */
    .field {
      margin-bottom: 20px;
      position: relative;
    }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 8px;
    }
    .field-wrap {
      position: relative;
    }
    .field input,
    .field textarea {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      padding: 12px 44px 12px 14px;
      transition: border-color 0.25s, box-shadow 0.25s;
      outline: none;
      resize: none;
    }
    .field textarea { padding-right: 14px; min-height: 90px; }
    .field input:focus,
    .field textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,109,250,.15);
    }
    .field.valid input,
    .field.valid textarea {
      border-color: var(--success);
      box-shadow: 0 0 0 3px rgba(74,222,128,.1);
    }
    .field.invalid input,
    .field.invalid textarea {
      border-color: var(--error);
      box-shadow: 0 0 0 3px rgba(248,113,113,.1);
    }
    .field-icon {
      position: absolute;
      right: 13px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .field-error {
      font-size: 11.5px;
      color: var(--error);
      margin-top: 5px;
      min-height: 16px;
      transition: opacity 0.2s;
    }
    .char-counter {
      font-size: 11px;
      color: var(--muted);
      text-align: right;
      margin-top: 4px;
    }
    .char-counter.warn { color: var(--warning); }
    .char-counter.over { color: var(--error); }

    /* ─── Submit Button ─── */
    .btn-submit {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: opacity 0.25s, transform 0.15s;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
    }
    .btn-submit:disabled {
      opacity: 0.35;
      cursor: not-allowed;
      transform: none;
    }
    .btn-submit:not(:disabled):hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-submit:not(:disabled):active { transform: translateY(0); }

    /* ─── Success Message ─── */
    .success-msg {
      display: none;
      background: rgba(74,222,128,.1);
      border: 1px solid var(--success);
      border-radius: 10px;
      padding: 14px 16px;
      color: var(--success);
      font-size: 13px;
      margin-top: 16px;
      text-align: center;
    }
    .success-msg.show { display: block; animation: fadeIn .35s ease; }

    /* ─── Search Section ─── */
    .search-input-wrap {
      position: relative;
      margin-bottom: 16px;
    }
    .search-input-wrap input {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      padding: 12px 14px 12px 42px;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }
    .search-input-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,109,250,.15);
    }
    .search-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 16px;
      pointer-events: none;
    }
    .search-meta {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .search-list {
      max-height: 420px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }
    .search-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13.5px;
      transition: border-color .2s, background .2s;
      cursor: default;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .search-item:hover {
      border-color: var(--accent);
      background: rgba(124,109,250,.05);
    }
    .search-item .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      color: #fff;
    }
    .search-item mark {
      background: rgba(124,109,250,.35);
      color: var(--text);
      border-radius: 2px;
      padding: 0 1px;
    }
    .search-empty {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      padding: 40px 20px;
    }
    .search-empty span { font-size: 28px; display: block; margin-bottom: 8px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  </style>
</head>
<body>

<header class="page-header">
  <h1>ПР6 · Варіант 1</h1>
  <span class="badge">JavaScript Events & DOM</span>
</header>

<div class="container">

  <!-- ══════════ FORM SECTION ══════════ -->
  <div class="card">
    <div class="section-title">Контактна форма</div>

    <div class="progress-wrap">
      <div class="progress-label">
        <span>Заповнення форми</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <form id="contactForm" novalidate>

      <div class="field" id="field-name">
        <label for="inp-name">Ім'я</label>
        <div class="field-wrap">
          <input type="text" id="inp-name" placeholder="Олексій Коваль" autocomplete="name" />
          <span class="field-icon" id="icon-name"></span>
        </div>
        <div class="field-error" id="err-name"></div>
      </div>

      <div class="field" id="field-email">
        <label for="inp-email">Email</label>
        <div class="field-wrap">
          <input type="email" id="inp-email" placeholder="example@gmail.com" autocomplete="email" />
          <span class="field-icon" id="icon-email"></span>
        </div>
        <div class="field-error" id="err-email"></div>
      </div>

      <div class="field" id="field-phone">
        <label for="inp-phone">Телефон</label>
        <div class="field-wrap">
          <input type="tel" id="inp-phone" placeholder="+380XXXXXXXXX" autocomplete="tel" />
          <span class="field-icon" id="icon-phone"></span>
        </div>
        <div class="field-error" id="err-phone"></div>
      </div>

      <div class="field" id="field-msg">
        <label for="inp-msg">Повідомлення</label>
        <div class="field-wrap">
          <textarea id="inp-msg" placeholder="Напишіть ваше повідомлення (20–500 символів)..."></textarea>
        </div>
        <div class="char-counter" id="char-counter">0 / 500</div>
        <div class="field-error" id="err-msg"></div>
      </div>

      <button type="submit" class="btn-submit" id="submitBtn" disabled>
        Надіслати повідомлення →
      </button>
    </form>

    <div class="success-msg" id="successMsg">
      ✅ Повідомлення успішно надіслано! Дякуємо за звернення.
    </div>
  </div>

  <!-- ══════════ SEARCH SECTION ══════════ -->
  <div class="card">
    <div class="section-title">Пошук студентів</div>

    <div class="search-input-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Введіть ім'я або спеціальність..." />
    </div>

    <div class="search-meta" id="searchMeta">Всього: 35 студентів</div>
    <div class="search-list" id="searchList"></div>
  </div>

</div>

<script>
// ═══════════════════════════════════════════
//  UTILITIES
// ═══════════════════════════════════════════
function debounce(fn, delay) {
  let t;
  return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), delay); };
}

// ═══════════════════════════════════════════
//  FORM VALIDATION
// ═══════════════════════════════════════════
const validators = {
  name: function(v) {
    if (!v) return "Введiть iм\u2019я";
    if (!/^[a-zA-Z\u0400-\u04FF'\s\-]{2,}$/u.test(v)) return "Мiнiмум 2 символи, лише лiтери";
    return '';
  },
  email: function(v) {
    if (!v) return 'Введiть email';
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) return 'Невiрний формат email';
    return '';
  },
  phone: function(v) {
    if (!v) return 'Введiть телефон';
    var clean = v.replace(/[\s\-\(\)]/g, '');
    if (!/^\+380\d{9}$/.test(clean)) return 'Формат: +380XXXXXXXXX';
    return '';
  },
  msg: function(v) {
    if (!v) return 'Введiть повiдомлення';
    if (v.length < 20) return 'Мiнiмум 20 символiв (зараз: ' + v.length + ')';
    if (v.length > 500) return 'Максимум 500 символiв (зараз: ' + v.length + ')';
    return '';
  }
};

var fieldState = { name: false, email: false, phone: false, msg: false };

function setField(key, error) {
  var wrapper = document.getElementById('field-' + key);
  var errEl   = document.getElementById('err-'   + key);
  var iconEl  = document.getElementById('icon-'  + key);
  if (!wrapper) return;
  wrapper.classList.toggle('valid',   !error);
  wrapper.classList.toggle('invalid', !!error);
  if (errEl)  errEl.textContent  = error || '';
  if (iconEl) iconEl.textContent = error ? '\u2717' : '\u2713';
  fieldState[key] = !error;
  updateProgress();
}

function updateProgress() {
  var validCount = Object.values(fieldState).filter(Boolean).length;
  var pct = Math.round((validCount / 4) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressPercent').textContent = pct + '%';
  document.getElementById('submitBtn').disabled = (pct < 100);
}

// Text inputs
['name', 'email', 'phone'].forEach(function(key) {
  var inp = document.getElementById('inp-' + key);
  if (!inp) return;
  var dv = debounce(function() {
    setField(key, validators[key](inp.value.trim()));
  }, 300);
  inp.addEventListener('input', dv);
});

// Textarea + char counter
var msgInp     = document.getElementById('inp-msg');
var charCounter = document.getElementById('char-counter');

function handleMsg() {
  var val = msgInp.value;
  var len = val.length;
  charCounter.textContent = len + ' / 500';
  charCounter.className = 'char-counter' + (len > 500 ? ' over' : len > 400 ? ' warn' : '');
  setField('msg', validators.msg(val.trim()));
}

msgInp.addEventListener('input', debounce(handleMsg, 300));

// Submit
document.getElementById('contactForm').addEventListener('submit', function(e) {
  e.preventDefault();
  var btn = document.getElementById('submitBtn');
  btn.textContent = 'Надсилання...';
  btn.disabled = true;
  setTimeout(function() {
    document.getElementById('successMsg').classList.add('show');
    btn.textContent = 'Надiслати повiдомлення \u2192';
    document.getElementById('contactForm').reset();
    Object.keys(fieldState).forEach(function(k) {
      fieldState[k] = false;
      var fw = document.getElementById('field-' + k);
      if (fw) { fw.classList.remove('valid', 'invalid'); }
      var ic = document.getElementById('icon-' + k);
      if (ic) ic.textContent = '';
      var er = document.getElementById('err-' + k);
      if (er) er.textContent = '';
    });
    charCounter.textContent = '0 / 500';
    charCounter.className = 'char-counter';
    updateProgress();
  }, 900);
});

// ═══════════════════════════════════════════
//  SEARCH
// ═══════════════════════════════════════════
const students = [
  { name: 'Олексій Коваль', spec: 'Комп\u2019ютерні науки' },
  { name: 'Марія Іванова', spec: 'Програмна інженерія' },
  { name: 'Денис Шевченко', spec: 'Системний аналіз' },
  { name: 'Аліна Бондаренко', spec: 'Кібербезпека' },
  { name: 'Максим Ткаченко', spec: 'Штучний інтелект' },
  { name: 'Катерина Мельник', spec: 'Веб-розробка' },
  { name: 'Роман Гончаренко', spec: 'Бази даних' },
  { name: 'Юлія Савченко', spec: 'Комп\u2019ютерні науки' },
  { name: 'Артем Кравченко', spec: 'Програмна інженерія' },
  { name: 'Вікторія Поліщук', spec: 'UX/UI Design' },
  { name: 'Богдан Романенко', spec: 'Системний аналіз' },
  { name: 'Тетяна Захаренко', spec: 'Мережеві технології' },
  { name: 'Олег Литвиненко', spec: 'Штучний інтелект' },
  { name: 'Наталія Тимошенко', spec: 'Комп\u2019ютерні науки' },
  { name: 'Михайло Хоменко', spec: 'Кібербезпека' },
  { name: 'Анна Яременко', spec: 'Веб-розробка' },
  { name: 'Сергій Остапенко', spec: 'Програмна інженерія' },
  { name: 'Ірина Данилюк', spec: 'Бази даних' },
  { name: 'Василь Примаченко', spec: 'Системний аналіз' },
  { name: 'Лариса Войченко', spec: 'Мережеві технології' },
  { name: 'Євген Гаврилюк', spec: 'UX/UI Design' },
  { name: 'Діана Лукянченко', spec: 'Штучний інтелект' },
  { name: 'Іван Пилипенко', spec: 'Кібербезпека' },
  { name: 'Оксана Нечипоренко', spec: 'Комп\u2019ютерні науки' },
  { name: 'Андрій Губаренко', spec: 'Програмна інженерія' },
  { name: 'Поліна Харченко', spec: 'Веб-розробка' },
  { name: 'Дмитро Загорулько', spec: 'Бази даних' },
  { name: 'Тамара Рибаченко', spec: 'Мережеві технології' },
  { name: 'Олена Гудзь', spec: 'Системний аналіз' },
  { name: 'Пилип Скрипник', spec: 'Штучний інтелект' },
  { name: 'Жанна Власенко', spec: 'UX/UI Design' },
  { name: 'Руслан Дяченко', spec: 'Кібербезпека' },
  { name: 'Валерія Москаленко', spec: 'Комп\u2019ютерні науки' },
  { name: 'Костянтин Зінченко', spec: 'Програмна інженерія' },
  { name: 'Вероніка Кириленко', spec: 'Веб-розробка' },
];

function highlight(text, query) {
  if (!query) return text;
  const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function initials(name) {
  return name.split(' ').map(p => p[0]).join('').slice(0, 2).toUpperCase();
}

function renderList(query) {
  const list = document.getElementById('searchList');
  const meta = document.getElementById('searchMeta');
  const q = query.trim().toLowerCase();

  const filtered = q
    ? students.filter(s =>
        s.name.toLowerCase().includes(q) || s.spec.toLowerCase().includes(q)
      )
    : students;

  meta.textContent = q
    ? `Знайдено: ${filtered.length} з ${students.length}`
    : `Всього: ${students.length} студентів`;

  if (!filtered.length) {
    list.innerHTML = '<div class="search-empty"><span>🔍</span>Нічого не знайдено</div>';
    return;
  }

  list.innerHTML = filtered.map(s => `
    <div class="search-item">
      <div class="avatar">${initials(s.name)}</div>
      <div>
        <div style="font-weight:500">${highlight(s.name, query.trim())}</div>
        <div style="font-size:12px;color:var(--muted)">${highlight(s.spec, query.trim())}</div>
      </div>
    </div>
  `).join('');
}

const searchInput = document.getElementById('searchInput');
const debouncedSearch = debounce(e => renderList(e.target.value), 300);
searchInput.addEventListener('input', debouncedSearch);

renderList('');
</script>
</body>
</html>
